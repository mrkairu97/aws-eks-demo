apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatbot.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chatbot.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "chatbot.selectorLabels" . | nindent 4 }}
